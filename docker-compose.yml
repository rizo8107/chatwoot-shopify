version: '3.8'

services:
  chatwoot-automation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatwoot-automation
    ports:
      - "3000:3000"
    # Data now lives in InsForge (cloud Postgres) — no local volume needed.
    environment:
      - PORT=3000
      # InsForge connection string — provided via .env (not committed). See .env.example.
      - INSFORGE_DATABASE_URL=${INSFORGE_DATABASE_URL}
      # Optional fallbacks; live values are stored in the InsForge `settings` table.
      - CHATWOOT_API_URL=https://chat.stomatalfarms.com
      - CHATWOOT_ACCOUNT_ID=1
      - CHATWOOT_INBOX_ID=1
    restart: unless-stopped
